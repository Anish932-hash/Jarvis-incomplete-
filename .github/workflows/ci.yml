name: JARVIS CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test deps
        working-directory: JARVIS_BACKEND
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Run backend tests with coverage gate
        working-directory: JARVIS_BACKEND
        run: |
          ./scripts/run_tests.ps1 -Coverage

  gui-quality:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: JARVIS_GUI/package-lock.json

      - name: Install GUI dependencies
        working-directory: JARVIS_GUI
        run: npm ci

      - name: Lint GUI
        working-directory: JARVIS_GUI
        run: npm run lint

      - name: Typecheck GUI
        working-directory: JARVIS_GUI
        run: npm run typecheck

      - name: Run GUI tests
        working-directory: JARVIS_GUI
        run: npm run test

